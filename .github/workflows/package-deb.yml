name: Package Debian

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  deb:
    name: Build .deb
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Installer les dépendances système
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libadwaita-1-dev \
            libdbus-1-dev \
            libudev-dev \
            libssl-dev \
            pkg-config \
            cmake \
            clang \
            libclang-dev \
            debhelper \
            devscripts \
            fakeroot

      - name: Configurer Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-deb-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Build .deb
        run: bash scripts/build-deb.sh

      - name: Upload artefact .deb
        uses: actions/upload-artifact@v4
        with:
          name: serial-term-deb
          path: |
            build-dir/*.deb
            build-dir/*.dsc
            build-dir/*.tar.xz
          retention-days: 90
